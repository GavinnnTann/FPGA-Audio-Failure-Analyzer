[platformio]
default_envs = esp32dev
src_dir = .

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
; Larger app partition (1.9 MB) to accommodate WiFi + TLS libraries.
; Disables OTA (not needed for this project).
board_build.partitions = min_spiffs.csv

; Keep your existing exported files in the project root and subfolders.
build_src_filter =
  +<ui.c>
  +<ui_helpers.c>
  +<components/ui_comp_hook.c>
  +<screens/ui_Screen1.c>
  +<screens/ui_Screen2.c>
  +<screens/ui_Screen3.c>
  +<screens/ui_Screen4.c>
  +<screens/ui_img_qr_code.c>
  +<screens/cnn_image.c>
  +<screens/Audio Failure Analyzer Full Logo.c>
  +<Example 480x320 display/ui_img_ellipsis_png.c>
  +<src/hardware.cpp>
  +<src/failure_dots.cpp>
  +<src/screen2_telemetry.cpp>
  +<src/wifi_uploader.cpp>
  +<src/main.cpp>

lib_deps =
  lvgl/lvgl@^9.3.0
  bodmer/TFT_eSPI@^2.5.43
  adafruit/Adafruit FT6206 Library@^1.1.1

build_flags =
  -D LV_CONF_INCLUDE_SIMPLE
  -D LV_FONT_MONTSERRAT_10=1
  -D LV_FONT_MONTSERRAT_16=1
  -D LV_FONT_MONTSERRAT_20=1
  -D LV_FONT_MONTSERRAT_24=1
  -D LV_FONT_MONTSERRAT_28=1
  -D LV_FONT_MONTSERRAT_30=1
  -D LV_FONT_MONTSERRAT_48=1
  ; Runtime display tuning (pinout/driver are defined in TFT_eSPI User_Setup.h)
  -D LVGL_TFT_ROTATION=1
  -D LVGL_TFT_INVERT_COLORS=0
  -I .

